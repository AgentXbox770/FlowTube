<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="FlowTube">
    <meta property="og:description" content="Be famous, Grow views.">
    <meta property="og:type" content="website">
    
    <!-- Standard meta -->
    <meta name="title" content="FlowTube">
    <meta name="description" content="Be famous, Grow views.">
    
    <title>FlowTube</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">
    <link rel="shortcut icon" href="logo.ico">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f7;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 550px;
            width: 100%;
        }

        /* Logo - SAME SIZE AS THE BOX (full width) */
        .logo-wrapper {
            width: 100%;
            margin-bottom: 20px;
        }
        
        .logo {
            width: 100%;
            height: auto;
            display: block;
        }

        /* BitView-style box */
        .bitview-box {
            background: white;
            border: 1px solid #d0d0d0;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            width: 100%;
        }

        .bitview-box h1 {
            font-size: 32px;
            font-weight: normal;
            color: #333;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .maintenance-text {
            font-size: 18px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 0;
            line-height: 1.5;
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #777;
        }

        @media (max-width: 550px) {
            .bitview-box {
                padding: 30px 20px;
            }
            .bitview-box h1 {
                font-size: 28px;
            }
            .maintenance-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo - full width same as box -->
        <div class="logo-wrapper">
            <img class="logo" src="logo.ico" alt="FlowTube Logo" onerror="this.style.display='none'">
        </div>
        
        <!-- BitView-style box -->
        <div class="bitview-box">
            <h1>FlowTube</h1>
            <div class="maintenance-text">This site is currently being made and soon be finished, Thanks for visiting! :)</div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            If you are a PC user, add it as an app :)
        </div>
    </div>
    
    <script>
        // Change Chrome mobile address bar color between purple and blue every 5 seconds
        const colors = ['#9b59b6', '#1e88e5']; // Purple, Blue
        let index = 0;
        
        // Create or update theme-color meta tag
        let themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (!themeColorMeta) {
            themeColorMeta = document.createElement('meta');
            themeColorMeta.name = 'theme-color';
            document.head.appendChild(themeColorMeta);
        }
        
        setInterval(() => {
            themeColorMeta.content = colors[index];
            index = (index + 1) % colors.length;
        }, 5000);
    </script>
</body>
</html>
