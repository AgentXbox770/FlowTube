<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="FlowTube">
    <meta property="og:description" content="Be famous, Grow views.">
    <meta property="og:type" content="website">
    
    <!-- Standard meta -->
    <meta name="title" content="FlowTube">
    <meta name="description" content="Be famous, Grow views.">
    
    <title>FlowTube</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">
    <link rel="shortcut icon" href="logo.ico">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f7;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 550px;
            width: 100%;
        }

        /* Logo - SAME SIZE AS THE BOX (full width) */
        .logo-wrapper {
            width: 100%;
            margin-bottom: 20px;
        }
        
        .logo {
            width: 100%;
            height: auto;
            display: block;
        }

        /* BitView-style box */
        .bitview-box {
            background: white;
            border: 1px solid #d0d0d0;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            width: 100%;
            transition: all 0.2s ease;
        }

        .bitview-box h1 {
            font-size: 32px;
            font-weight: normal;
            color: #333;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .maintenance-text {
            font-size: 18px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 0;
            line-height: 1.5;
        }

        /* Error state styles */
        .error-title {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }
        
        .error-text {
            font-size: 16px;
            color: #555;
            line-height: 1.5;
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #777;
        }
        
        .footer-error {
            color: #c0392b;
        }

        @media (max-width: 550px) {
            .bitview-box {
                padding: 30px 20px;
            }
            .bitview-box h1 {
                font-size: 28px;
            }
            .maintenance-text {
                font-size: 16px;
            }
            .error-title {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo - full width same as box -->
        <div class="logo-wrapper">
            <img class="logo" src="logo.ico" alt="FlowTube Logo" onerror="this.style.display='none'">
        </div>
        
        <!-- BitView-style box (content will be updated by JS) -->
        <div id="mainBox" class="bitview-box">
            <h1>FlowTube</h1>
            <div class="maintenance-text">Loading...</div>
        </div>
        
        <!-- Footer -->
        <div id="footer" class="footer">
            If you are a PC user, add it as an app :)
        </div>
    </div>
    
    <script>
        // Function to show error state (404)
        function showError(error) {
            const box = document.getElementById('mainBox');
            const footer = document.getElementById('footer');
            
            // Log the actual error to console (no editing)
            console.error(error);
            
            // Change box content to 404 error
            box.innerHTML = `
                <div class="error-title">404</div>
                <div class="error-text">Something went wrong while loading videos. Try again later :(</div>
            `;
            
            // Update footer with the actual error message (no editing)
            footer.innerHTML = `${error.message`};
            footer.classList.add('footer-error');
        }
        
        // Function to show normal/success state
        function showNormal() {
            const box = document.getElementById('mainBox');
            const footer = document.getElementById('footer');
            
            box.innerHTML = `
                <h1>FlowTube</h1>
                <div class="maintenance-text">This site is currently being made and soon be finished, Thanks for visiting! :)</div>
            `;
            
            footer.innerHTML = `If you are a PC user, add it as an app :)`;
            footer.classList.remove('footer-error');
        }
        
        // Firebase configuration (fake / invalid)
        const firebaseConfig = {
            apiKey: "AIzaSyDummyKeyForTesting123456789",
            authDomain: "flowtube-test.firebaseapp.com",
            projectId: "flowtube-test",
            storageBucket: "flowtube-test.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef1234567890"
        };
        
        // Load Firebase and verify it works by performing a dummy Firestore operation
        async function initFirebase() {
            // Helper to load scripts
            function loadScript(src) {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = () => reject(new Error(`Failed to load script: ${src}`));
                    document.head.appendChild(script);
                });
            }
            
            try {
                // 1. Load Firebase core and Firestore
                await loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js');
                await loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js');
                
                // 2. Initialize with our config
                const app = firebase.initializeApp(firebaseConfig);
                
                // 3. Try to use Firestore – this will fail if config is invalid
                const db = firebase.firestore();
                // Perform a dummy read to force Firebase to validate the config
                await db.collection('_dummy_').limit(1).get();
                
                // If we got here, Firebase is working
                console.log('Firebase loaded and operational');  // Keep it simple, no custom prefix
                showNormal();
            } catch (err) {
                // Any error (loading scripts, init, Firestore operation) triggers 404
                // Pass the original error object to showError (no editing)
                showError(err);
            }
        }
        
        // Start Firebase initialization
        initFirebase();
        
        // Address bar color changer (purple and blue every 5 seconds)
        const colors = ['#9b59b6', '#1e88e5']; // Purple, Blue
        let colorIndex = 0;
        
        let themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (!themeColorMeta) {
            themeColorMeta = document.createElement('meta');
            themeColorMeta.name = 'theme-color';
            document.head.appendChild(themeColorMeta);
        }
        
        setInterval(() => {
            themeColorMeta.content = colors[colorIndex];
            colorIndex = (colorIndex + 1) % colors.length;
        }, 5000);
        
        // Set initial theme color
        themeColorMeta.content = '#1e88e5';
    </script>
</body>
    </html>
